<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Enterprise — Interactive Demo</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwindcss.config={darkMode:'class',theme:{extend:{colors:{primary:'#f97316','primary-light':'#fb923c','dark-bg':'#0f1117','dark-card':'#1a1d27','dark-border':'#2a2d3a','text-main':'#e2e8f0','text-muted':'#94a3b8'}}}}</script>
<style>
body{background:#0f1117;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif}
.sidebar{width:240px;background:#1a1d27;border-right:1px solid #2a2d3a;height:100vh;overflow-y:auto;position:fixed}
.main{margin-left:240px;padding:24px;min-height:100vh}
.card{background:#1a1d27;border:1px solid #2a2d3a;border-radius:12px;padding:20px}
.kpi{text-align:center;padding:16px}
.kpi .num{font-size:28px;font-weight:700;color:#f97316}
.kpi .label{font-size:12px;color:#94a3b8;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 16px;border-radius:8px;cursor:pointer;color:#94a3b8;font-size:14px;margin:2px 8px}
.nav-item:hover,.nav-item.active{background:#2a2d3a;color:#e2e8f0}
.nav-item.active{border-left:3px solid #f97316}
.badge{display:inline-block;padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:600}
.badge-green{background:#065f4620;color:#4ade80;border:1px solid #4ade8040}
.badge-blue{background:#1e40af20;color:#60a5fa;border:1px solid #60a5fa40}
.badge-yellow{background:#92400e20;color:#fbbf24;border:1px solid #fbbf2440}
.badge-red{background:#7f1d1d20;color:#f87171;border:1px solid #f8717140}
.badge-purple{background:#581c8720;color:#c084fc;border:1px solid #c084fc40}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 12px;color:#94a3b8;font-size:12px;font-weight:600;text-transform:uppercase;border-bottom:1px solid #2a2d3a}
td{padding:10px 12px;border-bottom:1px solid #2a2d3a20;font-size:14px}
.soul-layer{border:1px solid #2a2d3a;border-radius:8px;padding:16px;margin-bottom:12px}
.soul-layer.locked{border-color:#f8717140;background:#7f1d1d10}
.soul-layer pre{background:#0f1117;padding:12px;border-radius:6px;font-size:12px;overflow-x:auto;white-space:pre-wrap;color:#94a3b8;margin-top:8px}
.tab{padding:8px 16px;cursor:pointer;border-bottom:2px solid transparent;color:#94a3b8;font-size:14px}
.tab.active{color:#f97316;border-bottom-color:#f97316}
.chat-msg{max-width:80%;padding:12px 16px;border-radius:12px;margin-bottom:8px;font-size:14px;line-height:1.5}
.chat-user{background:#2a2d3a;margin-left:auto;border-bottom-right-radius:4px}
.chat-agent{background:#1e293b;border-bottom-left-radius:4px}
.role-switcher{display:flex;gap:8px;margin-bottom:16px}
.role-btn{padding:6px 14px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid #2a2d3a;background:#1a1d27;color:#94a3b8}
.role-btn.active{background:#f97316;color:white;border-color:#f97316}
.progress-bar{height:6px;background:#2a2d3a;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width 0.3s}
</style>
</head>
<body>
<div class="sidebar" id="sidebar"></div>
<div class="main" id="main"></div>

// ============================================================
// Navigation
// ============================================================
const PAGES=[
  {id:'dashboard',icon:'📊',label:'Dashboard'},
  {id:'departments',icon:'🏢',label:'Departments',group:'Organization'},
  {id:'positions',icon:'💼',label:'Positions'},
  {id:'employees',icon:'👥',label:'Employees'},
  {id:'agents',icon:'🤖',label:'Agent Factory',group:'Agents'},
  {id:'soul',icon:'🧬',label:'SOUL Editor'},
  {id:'skills',icon:'🔧',label:'Skill Platform',group:'Platform'},
  {id:'knowledge',icon:'📚',label:'Knowledge Base'},
  {id:'bindings',icon:'🔗',label:'Bindings'},
  {id:'monitor',icon:'📡',label:'Monitor',group:'Operations'},
  {id:'audit',icon:'🛡️',label:'Audit Center'},
  {id:'usage',icon:'💰',label:'Usage & Cost'},
  {id:'approvals',icon:'✅',label:'Approvals'},
  {id:'settings',icon:'⚙️',label:'Settings',group:'System'},
  {id:'portal',icon:'💬',label:'Employee Portal',group:'Portal'},
];
let currentPage='dashboard';

function renderSidebar(){
  let h=`<div style="padding:16px 20px;border-bottom:1px solid #2a2d3a;display:flex;align-items:center;gap:10px">
    <div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#ef4444,#f97316);display:flex;align-items:center;justify-content:center;font-size:20px">🦞</div>
    <div><div style="font-weight:700;font-size:15px;color:#e2e8f0">OpenClaw Enterprise</div><div style="font-size:11px;color:#94a3b8">on AgentCore · aws-samples</div></div>
  </div>`;
  h+=`<div style="padding:12px 16px"><div class="role-switcher">`;
  ['admin','manager','employee'].forEach(r=>{
    h+=`<div class="role-btn ${MOCK.role===r?'active':''}" onclick="switchRole('${r}')">${r}</div>`;
  });
  h+=`</div><div style="font-size:11px;color:#94a3b8">Viewing as: ${MOCK.roleName} (${MOCK.roleTitle})</div></div>`;
  let lastGroup='';
  PAGES.forEach(p=>{
    if(p.id==='portal'&&MOCK.role!=='employee')return;
    if(p.id!=='dashboard'&&p.id!=='portal'&&MOCK.role==='employee')return;
    if(p.group&&p.group!==lastGroup){lastGroup=p.group;h+=`<div style="padding:12px 16px 4px;font-size:11px;color:#64748b;text-transform:uppercase;font-weight:600">${p.group}</div>`;}
    h+=`<div class="nav-item ${currentPage===p.id?'active':''}" onclick="navigate('${p.id}')">${p.icon} ${p.label}</div>`;
  });
  h+=`<div style="padding:20px 16px;border-top:1px solid #2a2d3a;margin-top:auto;font-size:11px;color:#64748b">Built by <a href="mailto:wjiad@amazon.com" style="color:#f97316">wjiad@aws</a><br>Static Demo · Mock Data</div>`;
  document.getElementById('sidebar').innerHTML=h;
}

function switchRole(r){
  MOCK.role=r;
  if(r==='admin'){MOCK.roleName='Zhang San';MOCK.roleTitle='Admin';}
  if(r==='manager'){MOCK.roleName='Lin Xiaoyu';MOCK.roleTitle='Manager (Product)';currentPage='dashboard';}
  if(r==='employee'){MOCK.roleName='Carol Zhang';MOCK.roleTitle='Employee (Finance)';currentPage='portal';}
  renderSidebar();renderPage();
}
function navigate(p){currentPage=p;renderSidebar();renderPage();}

// ============================================================
// Page Renderers
// ============================================================
function renderPage(){
  const fn={dashboard:pgDashboard,departments:pgDepts,positions:pgPositions,employees:pgEmployees,agents:pgAgents,soul:pgSoul,skills:pgSkills,knowledge:pgKnowledge,bindings:pgBindings,monitor:pgMonitor,audit:pgAudit,usage:pgUsage,approvals:pgApprovals,settings:pgSettings,portal:pgPortal};
  document.getElementById('main').innerHTML=(fn[currentPage]||pgDashboard)();
}

function pgDashboard(){
  const kpis=[{n:20,l:'Employees'},{n:20,l:'Agents'},{n:18,l:'Active Agents'},{n:26,l:'Skills'},{n:8,l:'Live Sessions'},{n:2,l:'Pending Approvals'}];
  let h=`<h1 style="font-size:24px;font-weight:700;margin-bottom:20px">Dashboard</h1>`;
  h+=`<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px">`;
  kpis.forEach(k=>h+=`<div class="card kpi"><div class="num">${k.n}</div><div class="label">${k.l}</div></div>`);
  h+=`</div>`;
  h+=`<div style="display:grid;grid-template-columns:2fr 1fr;gap:16px">`;
  h+=`<div class="card"><h3 style="font-size:14px;color:#94a3b8;margin-bottom:12px">Conversation Trend (7 days)</h3>`;
  h+=`<div style="display:flex;align-items:end;gap:8px;height:120px">`;
  MOCK.usageTrend.forEach(d=>{
    const pct=d.req/200*100;
    h+=`<div style="flex:1;text-align:center"><div style="background:linear-gradient(to top,#f97316,#fb923c);height:${pct}%;border-radius:4px 4px 0 0;min-height:8px" title="${d.req} requests"></div><div style="font-size:10px;color:#64748b;margin-top:4px">${d.date.split(' ')[1]}</div></div>`;
  });
  h+=`</div></div>`;
  h+=`<div class="card"><h3 style="font-size:14px;color:#94a3b8;margin-bottom:12px">Agent Health</h3>`;
  [{l:'Active',n:18,c:'#4ade80'},{l:'Idle',n:1,c:'#fbbf24'},{l:'Error',n:1,c:'#f87171'}].forEach(s=>{
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0"><span style="font-size:13px">${s.l}</span><span style="color:${s.c};font-weight:600">${s.n}</span></div>`;
  });
  h+=`</div></div>`;
  h+=`<div class="card" style="margin-top:16px"><h3 style="font-size:14px;color:#94a3b8;margin-bottom:12px">Cost Summary (Last 7 Days)</h3>`;
  h+=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px">`;
  [{l:'Total Cost',v:'$62.70'},{l:'Avg/Day',v:'$8.96'},{l:'Total Requests',v:'1,085'},{l:'ChatGPT Equivalent',v:'$500/mo'}].forEach(s=>{
    h+=`<div><div style="font-size:20px;font-weight:700;color:#f97316">${s.v}</div><div style="font-size:12px;color:#94a3b8">${s.l}</div></div>`;
  });
  h+=`</div></div>`;
  return h;
}

function pgDepts(){
  let h=`<h1 style="font-size:24px;font-weight:700;margin-bottom:20px">Department Overview</h1>`;
  h+=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">`;
  MOCK.departments.filter(d=>MOCK.role!=='manager'||d.name==='Product').forEach(d=>{
    h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:start"><div><div style="font-size:16px;font-weight:600">${d.name}</div><div style="font-size:12px;color:#94a3b8">Head: ${d.head}</div></div><span class="badge badge-green">${d.count} people</span></div>`;
    h+=`<div style="margin-top:12px"><div style="font-size:11px;color:#94a3b8;margin-bottom:4px">Agent Coverage: ${d.coverage}%</div><div class="progress-bar"><div class="progress-fill" style="width:${d.coverage}%;background:${d.coverage>90?'#4ade80':d.coverage>70?'#fbbf24':'#f87171'}"></div></div></div>`;
    if(d.children.length)h+=`<div style="margin-top:8px;font-size:11px;color:#64748b">${d.children.length} sub-departments</div>`;
    h+=`</div>`;
  });
  h+=`</div>`;
  return h;
}

  let h=`<h1 style="font-size:24px;font-weight:700;margin-bottom:20px">Position Management</h1><div class="card"><table><thead><tr><th>Position</th><th>Department</th><th>Employees</th><th>Default Channel</th><th>SOUL Template</th></tr></thead><tbody>`;
  const posData=[
    ['Solutions Architect','Engineering',3,'telegram','pos-sa'],['Software Engineer','Engineering',3,'telegram','pos-sde'],
    ['DevOps Engineer','Engineering',2,'slack','pos-devops'],['QA Engineer','Engineering',1,'slack','pos-qa'],
    ['Account Executive','Sales',2,'whatsapp','pos-ae'],['Product Manager','Product',2,'slack','pos-pm'],
    ['Finance Analyst','Finance',2,'portal','pos-fa'],['HR Specialist','HR & Admin',1,'slack','pos-hr'],
    ['Customer Success Manager','Sales',2,'slack','pos-csm'],['Legal Counsel','Legal',1,'portal','pos-legal'],
  ];
  posData.forEach(p=>h+=`<tr><td style="font-weight:500">${p[0]}</td><td>${p[1]}</td><td>${p[2]}</td><td><span class="badge badge-blue">${p[3]}</span></td><td style="font-family:monospace;font-size:12px;color:#94a3b8">${p[4]}</td></tr>`);
  h+=`</tbody></table></div>`;
  return h;
}

function pgEmployees(){
  let h=`<h1 style="font-size:24px;font-weight:700;margin-bottom:20px">Employee Management</h1><div class="card"><table><thead><tr><th>Name</th><th>Position</th><th>Department</th><th>Role</th><th>Agent</th><th>Messages/Week</th></tr></thead><tbody>`;
  const emps=MOCK.role==='manager'?MOCK.employees.filter(e=>e.dept==='Product'):MOCK.employees;
  emps.forEach(e=>{
    const roleBadge=e.role==='admin'?'badge-red':e.role==='manager'?'badge-yellow':'badge-blue';
    h+=`<tr><td style="font-weight:500">${e.name}</td><td>${e.pos}</td><td>${e.dept}</td><td><span class="badge ${roleBadge}">${e.role}</span></td><td style="color:#94a3b8;font-size:13px">${e.agent}</td><td>${e.msgs}</td></tr>`;
  });
  h+=`</tbody></table></div>`;
  return h;
}

function pgAgents(){
  let h=`<h1 style="font-size:24px;font-weight:700;margin-bottom:20px">Agent Factory</h1><div style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px">`;
  MOCK.agents.forEach(a=>{
    h+=`<div class="card" style="cursor:pointer" onclick="navigate('soul')"><div style="display:flex;justify-content:space-between"><div><div style="font-size:15px;font-weight:600">${a.name}</div><div style="font-size:12px;color:#94a3b8">${a.pos} · ${a.emp}</div></div><span class="badge badge-green">${a.status}</span></div>`;
    h+=`<div style="display:flex;gap:16px;margin-top:12px;font-size:12px;color:#94a3b8"><span>⭐ ${a.quality}</span><span>🔧 ${a.skills} skills</span><span>📱 ${a.channels.join(', ')}</span></div></div>`;
  });
  h+=`</div>`;
  return h;
}

function pgSoul(){
  let h=`<h1 style="font-size:24px;font-weight:700;margin-bottom:4px">SOUL Editor</h1><p style="color:#94a3b8;font-size:13px;margin-bottom:20px">Three-layer identity injection — the core mechanism that gives each agent a unique identity</p>`;
  h+=`<div class="soul-layer locked"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:600;color:#f87171">🔒 Layer 1: Global (IT Locked — CISO + CTO approval required)</span><span class="badge badge-red">Read Only</span></div><pre>${MOCK.soulGlobal}</pre></div>`;
